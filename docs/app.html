  function applyFunc(f,x){switch(f){case'sin':return Math.sin(x);case'cos':return Math.cos(x);case'tan':return Math.tan(x);case'sqrt':return Math.sqrt(x);case'ln':return Math.log(x);case'log':return Math.log10(x);default:throw new Error('fn');}}
  function parseEval(s){var open=(s.match(/\(/g)||[]).length,close=(s.match(/\)/g)||[]).length;s=s+')'.repeat(Math.max(0,open-close));var tk=tokenize(s),p=0,peek=function(){return tk[p];},next=function(){return tk[p++];};function pExpr(){var v=pTerm();while(peek()&&peek().t==='op'&&(peek().v==='+'||peek().v==='-')){var o=next().v,r=pTerm();v=o==='+'?v+r:v-r;}return v;}function pTerm(){var v=pPow();while(peek()&&peek().t==='op'&&(peek().v==='*'||peek().v==='/'||peek().v==='mod')){var o=next().v,r=pPow();v=o==='*'?v*r:o==='/'?v/r:v%r;}return v;}function pPow(){var v=pUn();if(peek()&&peek().t==='op'&&peek().v==='^'){next();var r=pPow();v=Math.pow(v,r);}return v;}function pUn(){if(peek()&&peek().t==='op'&&peek().v==='-'){next();return-pUn();}if(peek()&&peek().t==='op'&&peek().v==='+'){next();return pUn();}return pPost();}function pPost(){var v=pPrim();while(peek()&&peek().t==='post'){var o=next().v;v=o==='!'?fact(v):v/100;}return v;}function pPrim(){var tok=peek();if(!tok)throw new Error('eof');if(tok.t==='num'){next();return tok.v;}if(tok.t==='lp'){next();var v=pExpr();if(peek()&&peek().t==='rp')next();return v;}if(tok.t==='func'){next();var a;if(peek()&&peek().t==='lp'){next();a=pExpr();if(peek()&&peek().t==='rp')next();}else a=pUn();return applyFunc(tok.v,a);}throw new Error('unexpected');}var r=pExpr();if(p<tk.length)throw new Error('trailing');if(!isFinite(r))throw new Error('inf');return r;}
  function fmt(n,dec){if(!isFinite(n))return'Error';var r;if(Math.abs(n)>=1e12||(Math.abs(n)<1e-7&&n!==0))r=n.toExponential(6);else r=n.toFixed(Math.min(dec!=null?dec:8,8));if(r.indexOf('e')<0&&r.indexOf('.')>=0)r=r.replace(/\.?0+$/,'');var neg=r[0]==='-';if(neg)r=r.slice(1);var parts=r.split('.');var ip=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');return(neg?'-':'')+ip+(parts[1]?'.'+parts[1]:'');}

  function updateDisplay(){var s=S.expr,hasResult=S.result!==null,big;if(S.listening)big='…';else if(hasResult)big=S.shown!=null?S.shown:S.result;else big=s?prettyExpr(s):'0';var len=String(big).length,fs;if(len<=4)fs=104;else if(len<=7)fs=76;else if(len<=11)fs=54;else if(len<=16)fs=38;else fs=27;resultLine.textContent=big;resultLine.style.fontSize=fs+'px';resultLine.style.color=hasResult?'var(--acc)':'var(--ink)';exprLine.textContent=hasResult?prettyExpr(S.lastEval)+'  =':'';if(S.listening){transcriptLine.style.display='block';transcriptLine.innerHTML=S.transcript||'Listening…'+'<span class="cursor"></span>';}else{transcriptLine.style.display='none';}if(S.listening){micIcon.classList.add('active');micIcon.style.background='var(--acc)';micIcon.style.color='#06251a';micIcon.style.boxShadow='0 0 34px rgba(34,201,142,0.5)';micIcon.style.border='none';}else{micIcon.classList.remove('active');micIcon.style.background='';micIcon.style.color='';micIcon.style.boxShadow='';micIcon.style.border='';}updateWaveform();}
